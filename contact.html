<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Portfolio</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button class="customize-btn" onclick="togglePanel()">
                <i class="fas fa-palette"></i> Customize
            </button>
        </div>
    </nav>
    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-content">
                <div class="contact-left">
                    <h2 id="contactHeading1">Let's create</h2>
                    <h2 class="gradient-text" id="contactHeading2">something amazing</h2>
                    <p class="contact-subtext" id="contactSubtext">Have a project in mind? Let's discuss how we can work together to bring your ideas to life.</p>
                  <br>
                    <div class="contact-email">
                        <i class="fas fa-envelope"></i>
                        <a href="mailto:hello@portfolio.com" id="contactEmail">hello@portfolio.com</a>
                    </div>
                        <div class="social-links" id="socialContainer">
                        <a href="#" class="social-link" data-platform="twitter"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-link" data-platform="linkedin"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" class="social-link" data-platform="github"><i class="fab fa-github"></i></a>
                        <a href="#" class="social-link" data-platform="dribbble"><i class="fab fa-dribbble"></i></a>
                    </div>
                </div>
              <br>
                <div class="contact-right">
                    <form class="contact-form" id="contactForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" placeholder="Your name" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" placeholder="your@email.com" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" placeholder="Project inquiry" required>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="5" placeholder="Tell me about your project..." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p id="footerText">© 2024 Portfolio. All rights reserved.</p>
                <div class="footer-social" id="footerSocial">
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </div>
    </footer>
    <!-- Customization Panel -->
    <div class="customization-panel" id="customizePanel">
        <div class="panel-header">
            <h3><i class="fas fa-palette"></i> Customize</h3>
            <button class="close-btn" onclick="togglePanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-content">
            <div class="tab-content active" id="contactTab">
                <h4>Contact Section</h4>
              <br>
                <div class="form-group">
                    <label>Heading Line 1</label>
                    <input type="text" id="editContactHeading1" value="Let's create" onchange="updateText('contactHeading1', this.value)">
                </div>
              <br>
                <div class="form-group">
                    <label>Heading Line 2 (Gradient)</label>
                    <input type="text" id="editContactHeading2" value="something amazing" onchange="updateText('contactHeading2', this.value)">
                </div>
              <br>
                <div class="form-group">
                    <label>Subtext</label>
                    <textarea id="editContactSubtext" rows="2" onchange="updateText('contactSubtext', this.value)">Have a project in mind? Let's discuss how we can work together to bring your ideas to life.</textarea>
                </div>
              <br>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="editContactEmail" value="hello@portfolio.com" onchange="updateEmail(this.value)">
                </div>
                <h4>Social Links</h4>
                <div class="social-editor">
                    <div class="social-edit">
                        <i class="fab fa-twitter"></i>
                        <input type="text" placeholder="Twitter URL" id="socialTwitter">
                    </div>
                    <div class="social-edit">
                        <i class="fab fa-linkedin-in"></i>
                        <input type="text" placeholder="LinkedIn URL" id="socialLinkedin">
                    </div>
                    <div class="social-edit">
                        <i class="fab fa-github"></i>
                        <input type="text" placeholder="GitHub URL" id="socialGithub">
                    </div>
                    <div class="social-edit">
                        <i class="fab fa-dribbble"></i>
                        <input type="text" placeholder="Dribbble URL" id="socialDribbble">
                    </div>
                </div>
                <h4>Footer</h4>
                <div class="form-group">
                    <label>Footer Text</label>
                    <input type="text" id="editFooterText" value="© 2024 Portfolio. All rights reserved." onchange="updateText('footerText', this.value)">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
